<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaseTrace Demo Preview</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              nyayaBlue: '#002B5B',
              nyayaLight: '#F3F8FF',
            },
            animation: {
              'fade-in-up': 'fadeInUp 0.5s ease-out forwards',
            },
            keyframes: {
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          }
        }
      }
    </script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel standalone for JSX processing in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
      body { background-color: #F3F8FF; font-family: system-ui, -apple-system, sans-serif; overflow-x: hidden; }
      @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      .animate-fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
      // API_URL now points to the secure Vercel backend function
      // It reads GEMINI_API_KEY from Vercel's environment variables or local .env
      const API_URL = '/api/chat';
      const { useState } = React;
      
      const Shield = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>;
      const Globe = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>;
      const Search = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>;
      const MessageCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>;
      const Clock = () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>;
      const AlertTriangle = () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>;
      const Menu = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>;
      const X = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
      const ArrowLeft = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>;
      const CheckCircle2 = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>;

      const mockComplaints = {
        "FIR-2026-DEL-001": {
          status: "In Progress",
          statusColor: "text-amber-600",
          statusBg: "bg-amber-100",
          title: "Stolen Two-Wheeler (Hero Splendor) - Vasant Kunj",
          filedAt: "Mar 20, 2026, 10:30 AM",
          officer: "Inspector Anil Kumar, Vasant Kunj North PS",
          updates: [
             { id: 1, date: "Mar 25, 2026", text: "CCTV footage obtained from outer intersection and suspects identified. Search operations directed." },
             { id: 2, date: "Mar 21, 2026", text: "FIR officially registered. Investigation formally assigned to investigating officer." },
          ]
        },
        "FIR-2026-MUM-002": {
          status: "Neglected",
          statusColor: "text-red-600",
          statusBg: "bg-red-100",
          title: "Mobile Phone Snatching - Bandra Kurla Complex",
          filedAt: "Feb 13, 2026, 06:15 PM",
          officer: "Sub-Inspector Ramesh Patil, BKC PS",
          updates: [
             { id: 1, date: "Feb 13, 2026", text: "FIR registered. Basic details recorded. Complainant asked to provide IMEI number." }
          ]
        }
      };

      const translations = {
        en: {
          title: "CaseTrace",
          heroHeading: "Track Your Police Complaint Status",
          heroSubheading: "Enter your Complaint ID (FIR Number) to get real-time updates on your case. Try: FIR-2026-DEL-001",
          placeholder: "e.g., FIR-2026-DEL-001",
          searchBtn: "Track Status",
          featuresTitle: "Our Services",
          feature1: "AI Case Follow-up Assistant",
          feature1Desc: "Chat with our intelligent assistant to understand your rights and next steps.",
          feature2: "Case Timeline",
          feature2Desc: "View a transparent timeline of actions taken by the police department.",
          feature3: "Escalation Alerts",
          feature3Desc: "Automatic alerts to higher authorities if your case is delayed.",
          footerText: "© 2026 CaseTrace Civic-Tech Initiative. All rights reserved.",
          backBtn: "Back to Search",
          caseTitle: "Complaint Details",
          caseStatus: "Current Status",
          filedOn: "Filed On",
          assignedTo: "Assigned To",
          timelineTitle: "Recent Case Updates",
          notFound: "No case found with that ID. Please check the ID and try again.",
          trySample: "Try our sample IDs:",
          downloadFIR: "Download FIR Summary",
          escalateBtn: "Escalate Now",
          noUpdateAlert: "⚠️ No update in 45 days. You may escalate to SP level.",
          timelineTab: "Case Timeline",
          chatTab: "AI Follow-up Assistant",
          chatHeader: "CaseTrace AI Consultant",
          chatStatus: "Available - Ask anything about your case protocols",
          chatInputPlaceholder: "e.g., How long will the investigation take?",
          chatSend: "Send",
          typingMsg: "AI is thinking..."
        },
        hi: {
          title: "CaseTrace",
          heroHeading: "अपनी पुलिस शिकायत की स्थिति ट्रैक करें",
          heroSubheading: "वास्तविक समय के अपडेट प्राप्त करने के लिए अपनी शिकायत आईडी (FIR नंबर) दर्ज करें। कोशिश करें: FIR-2026-DEL-001",
          placeholder: "जैसे: FIR-2026-DEL-001",
          searchBtn: "स्थिति ट्रैक करें",
          featuresTitle: "हमारी सेवाएँ",
          feature1: "एआई मामला फॉलो-अप सहायक",
          feature1Desc: "अपने अधिकारों और अगले कदमों को समझने के लिए हमारे बुद्धिमान सहायक से चैट करें।",
          feature2: "मामला समय-सीमा",
          feature2Desc: "पुलिस विभाग द्वारा की गई कार्रवाइयों की पारदर्शी समय-सीमा देखें।",
          feature3: "वृद्धि अलर्ट",
          feature3Desc: "यदि आपके मामले में देरी होती है तो उच्च अधिकारियों को स्वचालित अलर्ट।",
          footerText: "© 2026 CaseTrace सिविक-टेक पहल। सर्वाधिकार सुरक्षित।",
          backBtn: "खोज पर वापस जाएं",
          caseTitle: "शिकायत विवरण",
          caseStatus: "वर्तमान स्थिति",
          filedOn: "दर्ज की गई",
          assignedTo: "सौंपा गया",
          timelineTitle: "हालिया केस अपडेट",
          notFound: "उस आईडी वाला कोई मामला नहीं मिला। कृपया आईडी जांचें और पुनः प्रयास करें।",
          trySample: "हमारी नमूना आईडी आज़माएं:",
          downloadFIR: "FIR सारांश डाउनलोड करें",
          escalateBtn: "अभी एस्केलेट करें",
          noUpdateAlert: "⚠️ 45 दिनों में कोई अपडेट नहीं। आप एसपी स्तर तक एस्केलेट कर सकते हैं।",
          timelineTab: "मामला समय-सीमा",
          chatTab: "एआई फॉलो-अप सहायक",
          chatHeader: "CaseTrace एआई सलाहकार",
          chatStatus: "उपलब्ध - अपने मामले के प्रोटोकॉल के बारे में कुछ भी पूछें",
          chatInputPlaceholder: "जैसे, जांच में कितना समय लगेगा?",
          chatSend: "भेजें",
          typingMsg: "एआई सोच रहा है..."
        }
      };

      const EscalationView = ({ activeCase, complaintId, onBack, t }) => {
  const { useState } = React;
  const [chatInput, setChatInput] = useState('');
  const [messages, setMessages] = useState([
    { id: 0, text: `Hello! I am your AI Escalation Assistant. Based on your active case (${complaintId}), I can help you draft a formal complaint to the SP, find higher authority contacts, or prepare a WhatsApp message. What do you need?`, sender: "ai" }
  ]);
  const [isTyping, setIsTyping] = useState(false);
  const [formReason, setFormReason] = useState('No action taken');
  const [formDesc, setFormDesc] = useState('');

  const quickPrompts = [
    "Draft escalation letter to SP",
    "Draft WhatsApp message to officer",
    "What are my legal rights?",
    "How to file RTI for my case?"
  ];

  const handlePromptClick = (promptText) => {
    setChatInput(promptText);
    sendMsg(promptText);
  };

  const generatePDFLetter = () => {
    if (!activeCase) return;
    const element = document.createElement('div');
    element.innerHTML = `
      <div style="padding: 40px; font-family: 'Times New Roman', serif; line-height: 1.6; color: #000;">
        <h2 style="text-align: center; font-size: 22px; text-decoration: underline; margin-bottom: 30px;">FORMAL ESCALATION COMPLAINT</h2>
        <p><strong>To,</strong></p>
        <p style="margin: 0;">The Superintendent of Police (SP)</p>
        <p style="margin: 0;">District Police Headquarters</p>
        <p style="margin: 0;">Date: ${new Date().toLocaleDateString()}</p>
        <br/>
        <p><strong>Subject:</strong> Escalation of Neglected Police Complaint - FIR ${complaintId}</p>
        <br/>
        <p>Respected Sir/Madam,</p>
        <p>I am writing to formally escalate the lack of progress regarding my registered police complaint. The primary reason for escalation is: <strong>${formReason}</strong>.</p>
        <p>Citizen's Statement: <em>"${formDesc}"</em></p>
        <div style="margin: 20px 0; padding: 15px; border: 1px solid #000;">
          <p style="margin: 5px 0;"><strong>FIR Number:</strong> ${complaintId}</p>
          <p style="margin: 5px 0;"><strong>Filed On:</strong> ${activeCase.filedAt}</p>
          <p style="margin: 5px 0;"><strong>Current IO:</strong> ${activeCase.officer}</p>
        </div>
        <p>I request your direct intervention to review this case file under higher authority. I look forward to your prompt response in the interest of justice.</p>
        <br/><br/>
        <p>Sincerely,</p>
        <br/><p>_______________________</p><p>[Citizen Signature]</p>
      </div>
    `;
    window.html2pdf().from(element).set({ margin: 1, filename: `Higher_Authority_Escalation_${complaintId}.pdf` }).save();
  };

  const handleWhatsAppSend = () => {
    const text = encodeURIComponent(`Regarding FIR ${complaintId}:\nReason: ${formReason}\nDetails: ${formDesc}\nPlease review this case urgently.`);
    // Using dummy number for higher auth
    window.open(`https://wa.me/911123456790?text=${text}`, '_blank');
  };

  const sendMsg = (textOverride = null) => {
    const textToSend = textOverride || chatInput;
    if (!textToSend.trim()) return;
    const nMsg = { id: Date.now(), text: textToSend, sender: "user" };
    setMessages(prev => [...prev, nMsg]);
    if (!textOverride) setChatInput('');
    setIsTyping(true);

    const systemInstruction = `You are the CaseTrace Escalation Assistant. You help citizens escalate cases when police do not act. Current Case: FIR ${complaintId}, Status ${activeCase.status}, IO ${activeCase.officer}. Answer specifically about this case. If asked to draft a letter or WhatsApp message, output the exact draft with the real FIR details filled in. Instruct the user cleanly. Keep responses short and formatting clean (No markdown asterisks).`;
    const prompt = `${systemInstruction}\n\nUser: ${textToSend}`;

    fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    })
    .then(async (res) => {
      const data = await res.json();
      if(!res.ok) throw new Error(data.error?.message || "API Error");
      return data;
    })
    .then(data => {
      const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Sorry, I couldn't process that.";
      setMessages(prev => [...prev, { id: Date.now()+1, text: aiText, sender: "ai" }]);
    })
    .catch(err => {
      setMessages(prev => [...prev, { id: Date.now()+1, text: "AI is unavailable right now.", sender: "ai" }]);
    })
    .finally(() => setIsTyping(false));
  };

  return (
    <div className="bg-[#F3F8FF] py-8 px-4 animate-fade-in-up">
      <div className="max-w-6xl mx-auto">
        <button className="flex items-center text-[#002B5B] font-semibold mb-6 hover:text-blue-700 transition-colors w-max" onClick={onBack}>
          <ArrowLeft /> <span className="ml-1">Back to Home</span>
        </button>

        <h1 className="text-3xl font-extrabold text-[#002B5B] mb-8">Case Escalation Center</h1>

        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
          {/* Quick Contact Panel */}
          <div className="bg-white rounded-xl shadow-md p-6 border-t-4 border-[#002B5B] flex flex-col">
            <h2 className="text-xl font-bold mb-4 flex items-center gap-2 text-gray-800"><MessageCircle/> Quick Contact Panel</h2>
            <div className="space-y-4 flex-grow">
              <div className="p-3 bg-blue-50 rounded border border-blue-100">
                <p className="font-bold text-sm text-gray-500">Investigating Officer</p>
                <p className="font-bold">{activeCase.officer}</p>
                <div className="mt-2 flex gap-2">
                  <a href="tel:+911123456789" className="text-sm bg-[#002B5B] text-white px-3 py-1 rounded hover:bg-blue-800">Call</a>
                  <a href={`https://wa.me/911123456789?text=Hello Inspector, regarding ${complaintId}...`} target="_blank" className="text-sm bg-green-600 text-white px-3 py-1 rounded hover:bg-green-700">WhatsApp</a>
                </div>
              </div>
              <div className="p-3 bg-blue-50 rounded border border-blue-100">
                <p className="font-bold text-sm text-gray-500">Station House Officer (SHO)</p>
                <p className="font-bold">Vasant Kunj North PS</p>
                <div className="mt-2 flex gap-2">
                  <a href="tel:+911123456790" className="text-sm bg-[#002B5B] text-white px-3 py-1 rounded hover:bg-blue-800">Call</a>
                  <a href={`https://wa.me/911123456790?text=Hello SHO, escalating ${complaintId}...`} target="_blank" className="text-sm bg-green-600 text-white px-3 py-1 rounded hover:bg-green-700">WhatsApp</a>
                </div>
              </div>
              <div className="flex justify-between items-center px-2">
                <span className="font-semibold text-gray-600 border-b border-gray-300 pb-1 w-full flex justify-between">Police: <strong>100</strong></span>
              </div>
              <div className="flex justify-between items-center px-2">
                <span className="font-semibold text-gray-600 border-b border-gray-300 pb-1 w-full flex justify-between">Cyber: <strong>1930</strong></span>
              </div>
              <div className="flex justify-between items-center px-2">
                <span className="font-semibold text-gray-600 w-full flex justify-between">Women HF: <strong>1091</strong></span>
              </div>
            </div>
          </div>

          {/* AI Escalation Assistant */}
          <div className="bg-white rounded-xl shadow-md border border-gray-100 lg:col-span-2 flex flex-col h-[600px]">
            <div className="p-4 border-b border-gray-200 bg-blue-50 rounded-t-xl flex items-center gap-3">
               <div className="bg-[#002B5B] text-white p-2 rounded-full"><AlertTriangle /></div>
               <div><h3 className="font-bold text-lg text-gray-900">AI Escalation Assistant</h3>
               <p className="text-xs text-gray-500">Specialized help for neglected issues</p></div>
            </div>
            <div className="flex-grow overflow-y-auto p-4 space-y-3 custom-scrollbar">
               {messages.map(msg => (
                  <div key={msg.id} className={`flex ${msg.sender==='user'?'justify-end':'justify-start'}`}>
                     <div className={`max-w-[85%] rounded-xl p-3 text-sm ${msg.sender==='user'?'bg-[#002B5B] text-white rounded-tr-sm':'bg-gray-100 text-gray-800 border border-gray-200 rounded-tl-sm'}`}>
                        {msg.text.split('\\n').map((l,i,a) => <React.Fragment key={i}>{l}{i!==a.length-1&&<br/>}</React.Fragment>)}
                     </div>
                  </div>
               ))}
               {isTyping && <div className="text-gray-400 italic text-sm py-2">AI is typing...</div>}
            </div>
            
            <div className="p-3 bg-gray-50 border-t border-gray-200">
               <div className="flex flex-wrap gap-2 mb-3">
                 {quickPrompts.map(p => (
                   <button key={p} onClick={()=>handlePromptClick(p)} className="text-xs bg-white border border-[#002B5B] text-[#002B5B] px-3 py-1.5 rounded-full hover:bg-blue-50 transition shadow-sm font-semibold whitespace-nowrap">
                     {p}
                   </button>
                 ))}
               </div>
               <form onSubmit={(e)=>{e.preventDefault();sendMsg();}} className="relative">
                  <input type="text" value={chatInput} onChange={e=>setChatInput(e.target.value)} placeholder="Ask how to escalate..." className="w-full bg-white border border-gray-300 p-3 rounded-lg pr-20 outline-none focus:border-[#002B5B]" />
                  <button type="submit" disabled={!chatInput.trim()||isTyping} className="absolute right-1 top-1 bottom-1 bg-[#002B5B] text-white px-4 rounded-md font-semibold hover:bg-blue-900 disabled:opacity-50">Send</button>
               </form>
            </div>
          </div>
          
          {/* Report Form */}
          <div className="bg-white rounded-xl shadow-md p-6 border-t-4 border-red-600 md:col-span-2 lg:col-span-1 h-fit">
             <h2 className="text-xl font-bold mb-4 flex items-center gap-2 text-gray-800"><AlertTriangle/> Report to Higher Authority</h2>
             <div className="space-y-4">
                <div>
                   <label className="block text-sm font-semibold text-gray-600 mb-1">Complaint ID</label>
                   <input type="text" value={complaintId} disabled className="w-full bg-gray-100 border border-gray-200 rounded p-2 text-gray-500 font-mono" />
                </div>
                <div>
                   <label className="block text-sm font-semibold text-gray-600 mb-1">Reason for Escalation</label>
                   <select value={formReason} onChange={e=>setFormReason(e.target.value)} className="w-full border border-gray-300 rounded p-2 focus:outline-none focus:border-[#002B5B]">
                      <option>No action taken</option>
                      <option>Case neglected</option>
                      <option>Officer misbehavior</option>
                      <option>Demanding bribe</option>
                      <option>Other</option>
                   </select>
                </div>
                <div>
                   <label className="block text-sm font-semibold text-gray-600 mb-1">Description</label>
                   <textarea rows="3" value={formDesc} onChange={e=>setFormDesc(e.target.value)} className="w-full border border-gray-300 rounded p-2 focus:outline-none focus:border-[#002B5B] resize-none" placeholder="Provide details..."></textarea>
                </div>
                <div className="flex flex-col gap-2 pt-2">
                   <button onClick={generatePDFLetter} className="w-full bg-red-600 text-white font-bold py-2 rounded hover:bg-red-700 transition shadow">Generate Formal Letter (PDF)</button>
                   <button onClick={handleWhatsAppSend} className="w-full border border-green-600 text-green-700 font-bold py-2 rounded hover:bg-green-50 transition shadow-sm">Send via WhatsApp</button>
                </div>
             </div>
          </div>

          {/* Escalation Hierarchy */}
          <div className="bg-white rounded-xl shadow-md p-6 md:col-span-2 border border-gray-100">
             <h2 className="text-xl font-bold mb-6 flex items-center gap-2 text-gray-800 w-full justify-center">Escalation Protocol Ladder</h2>
             <div className="flex flex-col md:flex-row justify-between items-center text-center gap-4 relative">
                <div className="absolute top-1/2 left-0 w-full h-1 bg-gray-200 -z-10 hidden md:block mt-[-10px]"></div>
                
                {[
                  { level: "1. IO", desc: "Investigating Officer" },
                  { level: "2. SHO", desc: "Station House Officer (15 Days)" },
                  { level: "3. DSP", desc: "Deputy Superintendent" },
                  { level: "4. SP/DCP", desc: "Superintendent of Police (30 Days)" },
                  { level: "5. IGP", desc: "Inspector General" },
                  { level: "6. DGP", desc: "Director General" }
                ].map((step, idx) => (
                  <div key={idx} className="flex flex-col items-center bg-white p-2">
                    <div className={`w-14 h-14 rounded-full flex items-center justify-center font-bold text-white shadow-md z-10 ${idx < 2 ? 'bg-amber-500' : idx < 4 ? 'bg-orange-500' : 'bg-red-600'}`}>{step.level.split('.')[1]}</div>
                    <span className="text-xs font-bold text-gray-700 mt-2">{step.desc}</span>
                  </div>
                ))}
             </div>
          </div>

        </div>
      </div>
    </div>
  );
};


      function App() {
        const [lang, setLang] = useState('en');
        const [complaintId, setComplaintId] = useState('FIR-2026-DEL-001');
        const [isMenuOpen, setIsMenuOpen] = useState(false);
        const [activeCase, setActiveCase] = useState(null);
        const [currentView, setCurrentView] = useState('home');
        const [errorMsg, setErrorMsg] = useState('');
        
        // Chat & Tab States
        const [activeTab, setActiveTab] = useState('timeline');
        const [chatInput, setChatInput] = useState('');
        const [isTyping, setIsTyping] = useState(false);
        const [messages, setMessages] = useState([
          { id: 0, text: "Hello! I am CaseTrace AI. Based on your FIR-2026-DEL-001 regarding the stolen two-wheeler, police actions are currently underway. How can I help you today?", sender: "ai" }
        ]);

        const t = translations[lang];

        const handleSearch = (e) => {
          e.preventDefault();
          setErrorMsg('');
          const id = complaintId.trim();
          if (mockComplaints[id]) {
            setActiveCase(mockComplaints[id]);
            setActiveTab('timeline');
            setCurrentView('case');
            // Reset chat
            setMessages([{ id: 0, text: `Hello! I am CaseTrace AI. Based on your ${id} regarding the ${mockComplaints[id].title}, how can I help you today?`, sender: "ai" }]);
          } else {
            setActiveCase(null);
            setErrorMsg(t.notFound);
          }
        };

        const generateFIRSummary = () => {
          if (!activeCase) return;
          const element = document.createElement('div');
          element.innerHTML = `
            <div style="padding: 40px; font-family: sans-serif; color: #1f2937;">
              <h1 style="color: #002B5B; text-align: center; border-bottom: 2px solid #e5e7eb; padding-bottom: 10px; margin-bottom: 20px;">CaseTrace FIR Summary</h1>
              <h2 style="font-size: 24px; margin-bottom: 15px;">Case ID: ${complaintId.trim()}</h2>
              <div style="margin-bottom: 30px; background: #f3f4f6; padding: 20px; border-radius: 8px;">
                <p style="margin: 5px 0;"><strong>Status:</strong> <span style="color: ${activeCase.status === 'Neglected' ? '#dc2626' : '#ea580c'}; font-weight: bold;">${activeCase.status}</span></p>
                <p style="margin: 5px 0;"><strong>Filed On:</strong> ${activeCase.filedAt}</p>
                <p style="margin: 5px 0;"><strong>Assigned Officer:</strong> ${activeCase.officer}</p>
                <p style="margin: 5px 0;"><strong>Issue Reported:</strong> ${activeCase.title}</p>
              </div>
              <h3 style="font-size: 20px; border-bottom: 1px solid #e5e7eb; padding-bottom: 10px; margin-bottom: 15px;">Timeline Updates</h3>
              <ul style="list-style-type: none; padding-left: 0;">
                ${activeCase.updates.map(u => `<li style="margin-bottom: 15px; padding: 15px; border: 1px solid #e5e7eb; border-radius: 8px;"><strong>${u.date}</strong><br/>${u.text}</li>`).join('')}
              </ul>
            </div>
          `;
          window.html2pdf().from(element).set({ margin: 1, filename: `FIR_Summary_${complaintId.trim()}.pdf` }).save();
        };

        const generateEscalationLetter = () => {
          if (!activeCase) return;
          const element = document.createElement('div');
          element.innerHTML = `
            <div style="padding: 40px; font-family: 'Times New Roman', serif; line-height: 1.6; color: #000;">
              <h2 style="text-align: center; font-size: 22px; text-decoration: underline; margin-bottom: 30px;">FORMAL ESCALATION LETTER</h2>
              <p><strong>To,</strong></p>
              <p style="margin: 0;">The Superintendent of Police (SP)</p>
              <p style="margin: 0;">City Police Headquarters</p>
              <p style="margin: 0;">Date: ${new Date().toLocaleDateString()}</p>
              <br/>
              <p><strong>Subject:</strong> Escalation of Neglected Police Complaint - FIR ${complaintId.trim()}</p>
              <br/>
              <p>Respected Sir/Madam,</p>
              <p>I am writing to formally escalate the lack of progress and response regarding my registered police complaint. Despite filing the FIR several weeks ago, there continues to be no significant update or investigative progress.</p>
              <div style="margin: 20px 0; padding: 15px; border: 1px solid #000;">
                <p style="margin: 5px 0;"><strong>FIR Number:</strong> ${complaintId.trim()}</p>
                <p style="margin: 5px 0;"><strong>Filed On:</strong> ${activeCase.filedAt}</p>
                <p style="margin: 5px 0;"><strong>Assigned Officer:</strong> ${activeCase.officer}</p>
                <p style="margin: 5px 0;"><strong>Issue Reported:</strong> ${activeCase.title}</p>
              </div>
              <p>Pursuant to standard protocols outlined in the Indian Criminal Procedure Code, I request your direct intervention to review this case file and issue necessary directives to the investigating officer so that the matter can proceed towards a timely resolution.</p>
              <p>I look forward to your prompt response in the interest of justice.</p>
              <br/><br/>
              <p>Sincerely,</p>
              <br/>
              <p>_______________________</p>
              <p>[Citizen Name / Signature]</p>
            </div>
          `;
          window.html2pdf().from(element).set({ margin: 1, filename: `Escalation_Letter_${complaintId.trim()}.pdf` }).save();
        };

        const handleSendMessage = (e) => {
          e.preventDefault();
          if(!chatInput.trim()) return;

          const nMsg = { id: Date.now(), text: chatInput, sender: "user" };
          setMessages(prev => [...prev, nMsg]);
          setChatInput('');
          setIsTyping(true);

          // Real Gemini API call for demo.html
          const lastUpdate = activeCase.updates && activeCase.updates.length > 0 ? activeCase.updates[0].date + " - " + activeCase.updates[0].text : "No updates";
          const systemInstruction = `You are CaseTrace AI Consultant, a compassionate legal aid assistant helping Indian citizens track their police complaints. You have deep knowledge of Indian CrPC sections 154, 156, 173. You are aware of the user's case: complaint ID ${complaintId.trim()}, status ${activeCase.status}, assigned officer ${activeCase.officer}, last update ${lastUpdate}. Answer questions about their case, explain their legal rights simply, and if the case is neglected suggest escalating to SP level. Be warm, clear, and non-intimidating. Respond in the same language the user writes in (Hindi or English). Keep all responses under 5 lines unless the user asks for more detail. Be concise and warm. Never use markdown formatting symbols. Speak like a helpful friend, not a legal document. End every response with ONE relevant follow-up question.`;
          const prompt = `${systemInstruction}\n\nUser: ${chatInput}`;
          
          fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: prompt }] }]
            })
          })
          .then(async (res) => {
            const data = await res.json();
            if(!res.ok) {
              console.error("Gemini API Error:", data);
              throw new Error(data.error?.message || "API completed with error");
            }
            return data;
          })
          .then(data => {
            const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Sorry, I couldn't process that.";
            setMessages(prev => [...prev, { id: Date.now()+1, text: aiText, sender: "ai" }]);
          })
          .catch(err => {
            console.error(err);
            setMessages(prev => [...prev, { id: Date.now()+1, text: "Our AI assistant is temporarily unavailable. Please try again in a moment.", sender: "ai" }]);
          })
          .finally(() => setIsTyping(false));
        };

        return (
          <div className="min-h-screen bg-[#F3F8FF] flex flex-col font-sans text-gray-800 transition-colors duration-300">
            {/* Navbar */}
            <nav className="bg-[#002B5B] text-white shadow-md">
              <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div className="flex justify-between h-16 items-center">
                  <div className="flex items-center gap-2 cursor-pointer" onClick={() => { setActiveCase(null); setCurrentView('home'); }}>
                    <div className="text-white"><Shield /></div>
                    <span className="font-bold text-2xl tracking-wide">{t.title}</span>
                  </div>
                  
                  {/* Desktop Menu */}
                  <div className="hidden md:flex items-center space-x-6">
                    <button 
                      onClick={() => setLang(lang === 'en' ? 'hi' : 'en')}
                      className="flex items-center gap-1 hover:text-blue-200 transition-colors"
                    >
                      <Globe />
                      <span className="font-medium">{lang === 'en' ? 'हिंदी' : 'English'}</span>
                    </button>
                    <button className="bg-white text-[#002B5B] px-4 py-2 rounded-md font-semibold hover:bg-gray-100 transition shadow">
                      Login via OTP
                    </button>
                  </div>

                  {/* Mobile Menu Button */}
                  <div className="md:hidden flex items-center">
                    <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="text-white">
                      {isMenuOpen ? <X /> : <Menu />}
                    </button>
                  </div>
                </div>
              </div>
              
              {/* Mobile Menu */}
              {isMenuOpen && (
                <div className="md:hidden bg-blue-900 pb-4 px-4 space-y-3 animate-fade-in-up">
                   <button 
                      onClick={() => setLang(lang === 'en' ? 'hi' : 'en')}
                      className="flex items-center gap-2 text-white w-full py-2"
                    >
                      <Globe />
                      <span>{lang === 'en' ? 'Switch to Hindi' : 'Switch to English'}</span>
                    </button>
                    <button className="w-full bg-white text-[#002B5B] px-4 py-2 rounded-md font-semibold shadow">
                      Login via OTP
                    </button>
                </div>
              )}
            </nav>

            <main className="flex-grow">
              {currentView === 'home' && (
                <>
                  {/* Hero Section */}
                  <div className="bg-gradient-to-b from-[#002B5B] to-blue-800 text-white py-20 px-4 transition-all duration-500">
                    <div className="max-w-4xl mx-auto text-center animate-fade-in-up">
                      <h1 className="text-4xl md:text-5xl font-extrabold mb-6 leading-tight drop-shadow-sm">
                        {t.heroHeading}
                      </h1>
                      <p className="text-lg md:text-xl text-blue-100 mb-10 max-w-2xl mx-auto">
                        {t.heroSubheading}
                      </p>
                      
                      <form onSubmit={handleSearch} className="max-w-2xl mx-auto bg-white p-2 rounded-lg flex shadow-lg flex-col sm:flex-row gap-2 transition-transform transform hover:scale-[1.01]">
                        <div className="flex-grow flex items-center px-4 bg-gray-50 rounded-md border border-gray-200 focus-within:ring-2 ring-[#002B5B] transition-shadow">
                          <div className="text-gray-400 mr-2"><Search /></div>
                          <input
                            type="text"
                            placeholder={t.placeholder}
                            className="w-full bg-transparent outline-none p-3 text-gray-800 font-medium"
                            value={complaintId}
                            onChange={(e) => setComplaintId(e.target.value)}
                          />
                        </div>
                        <button 
                          type="submit"
                          className="bg-[#002B5B] hover:bg-blue-900 text-white px-8 py-3 rounded-md font-bold transition-colors whitespace-nowrap shadow-sm active:scale-95"
                        >
                          {t.searchBtn}
                        </button>
                      </form>

                      {errorMsg && (
                         <div className="mt-6 inline-flex items-center gap-2 bg-red-100/90 text-red-800 px-6 py-3 rounded-md border border-red-200 shadow-sm animate-fade-in-up">
                           <div className="text-red-600"><AlertTriangle /></div>
                           <span className="font-semibold text-sm">{errorMsg}</span>
                         </div>
                      )}
                      
                      <p className="mt-6 text-sm text-blue-200 font-medium">
                        {t.trySample} <br/>
                        <span className="cursor-pointer hover:text-white transition-colors" onClick={() => setComplaintId("FIR-2026-DEL-001")}><strong>FIR-2026-DEL-001</strong></span> (Active) | <span className="cursor-pointer hover:text-white transition-colors" onClick={() => setComplaintId("FIR-2026-MUM-002")}><strong>FIR-2026-MUM-002</strong></span> (Neglected)
                      </p>
                    </div>
                  </div>

                  {/* Features Section */}
                  <div className="py-20 px-4 bg-[#F3F8FF]">
                    <div className="max-w-6xl mx-auto">
                      <h2 className="text-3xl font-bold text-center text-[#002B5B] mb-12">
                        {t.featuresTitle}
                      </h2>
                      
                      <div className="grid md:grid-cols-3 gap-8">
                        <div 
                          onClick={() => {
                            setActiveCase(mockComplaints["FIR-2026-DEL-001"]);
                            setActiveTab('chat');
                            setCurrentView('case');
                          }}
                          className="bg-white p-8 rounded-xl shadow border border-gray-100 hover:-translate-y-1 hover:shadow-xl transition-all duration-300 text-center cursor-pointer transform hover:scale-[1.03]"
                        >
                          <div className="w-16 h-16 mx-auto bg-blue-50 rounded-full flex items-center justify-center mb-6 ring-4 ring-blue-50/50 text-[#002B5B] transition-transform group-hover:scale-110">
                            <MessageCircle />
                          </div>
                          <h3 className="text-xl font-bold text-gray-800 mb-3">{t.feature1}</h3>
                          <p className="text-gray-600 leading-relaxed mb-4">
                            {t.feature1Desc}
                          </p>
                          <span className="inline-block text-sm font-bold text-[#002B5B] bg-blue-50 px-3 py-1 rounded-full">Click to test →</span>
                        </div>

                        <div 
                          onClick={() => {
                            setActiveCase(mockComplaints["FIR-2026-DEL-001"]);
                            setActiveTab('timeline');
                            setCurrentView('case');
                          }}
                          className="bg-white p-8 rounded-xl shadow border border-gray-100 hover:-translate-y-1 hover:shadow-xl transition-all duration-300 text-center cursor-pointer transform hover:scale-[1.03]"
                        >
                          <div className="w-16 h-16 mx-auto bg-blue-50 rounded-full flex items-center justify-center mb-6 ring-4 ring-blue-50/50 text-[#002B5B]">
                            <Clock />
                          </div>
                          <h3 className="text-xl font-bold text-gray-800 mb-3">{t.feature2}</h3>
                          <p className="text-gray-600 leading-relaxed mb-4">
                            {t.feature2Desc}
                          </p>
                          <span className="inline-block text-sm font-bold text-[#002B5B] bg-blue-50 px-3 py-1 rounded-full">Click to test →</span>
                        </div>

                        <div 
                          onClick={() => {
                            setActiveCase(mockComplaints["FIR-2026-DEL-001"]);
                            setCurrentView('escalation');
                          }}
                          className="bg-white p-8 rounded-xl shadow border border-gray-100 hover:-translate-y-1 hover:shadow-xl transition-all duration-300 text-center cursor-pointer transform hover:scale-[1.03]"
                        >
                          <div className="w-16 h-16 mx-auto bg-red-50 rounded-full flex items-center justify-center mb-6 ring-4 ring-red-50/50 text-red-600">
                            <AlertTriangle />
                          </div>
                          <h3 className="text-xl font-bold text-gray-800 mb-3">{t.feature3}</h3>
                          <p className="text-gray-600 leading-relaxed mb-4">
                            {t.feature3Desc}
                          </p>
                          <span className="inline-block text-sm font-bold text-red-700 bg-red-50 px-3 py-1 rounded-full border border-red-100">Click to test →</span>
                        </div>
                      </div>
                    </div>
                  </div>
                </>
              )}
              
              {currentView === 'escalation' && activeCase && (
                <EscalationView 
                   activeCase={activeCase} 
                   complaintId={complaintId} 
                   onBack={() => { setActiveCase(null); setCurrentView('home'); }} 
                   t={t} 
                />
              )}

              {currentView === 'case' && activeCase && (
                /* Case Details View */
                <div className="bg-[#F3F8FF] py-12 px-4 transition-all duration-500 animate-fade-in-up">
                  <div className="max-w-4xl mx-auto">
                    <button 
                      onClick={() => { setActiveCase(null); setCurrentView('home'); }}
                      className="flex items-center text-[#002B5B] font-semibold mb-8 hover:text-blue-700 transition-colors w-max"
                    >
                      <ArrowLeft />
                      <span className="ml-1">{t.backBtn}</span>
                    </button>
                    
                    <div className="bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden">
                      <div className="bg-gray-50 border-b border-gray-200 p-6 sm:p-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div>
                           <h2 className="text-gray-400 font-semibold text-sm uppercase tracking-wider mb-1">{t.caseTitle}</h2>
                           <h1 className="text-2xl sm:text-3xl font-bold text-gray-900 truncate">
                              {complaintId.trim()}
                           </h1>
                        </div>
                        <div className="flex flex-col gap-3">
                          <div className={`flex items-center gap-2 px-4 py-2 rounded-full font-bold self-end ${activeCase.statusBg} ${activeCase.statusColor}`}>
                             <div className={`w-2 h-2 rounded-full ${activeCase.statusColor.replace('text', 'bg')}`}></div>
                             {activeCase.status}
                          </div>
                          <button 
                            onClick={generateFIRSummary}
                            className="text-sm bg-nyayaBlue text-white px-4 py-2 rounded shadow hover:bg-blue-800 transition-colors font-semibold"
                          >
                            {t.downloadFIR}
                          </button>
                        </div>
                      </div>

                      {activeCase.status === "Neglected" && (
                        <div className="bg-red-50 border-y border-red-200 p-4 sm:px-8 flex flex-col sm:flex-row justify-between items-center animate-fade-in-down gap-4">
                          <div className="flex items-center gap-3 text-red-800 font-semibold">
                            <div className="text-red-600"><AlertTriangle /></div>
                            <span>{t.noUpdateAlert}</span>
                          </div>
                          <button 
                            onClick={generateEscalationLetter}
                            className="bg-red-600 text-white px-6 py-2 rounded-md font-bold shadow hover:bg-red-700 transition transform hover:scale-105 whitespace-nowrap"
                          >
                            {t.escalateBtn}
                          </button>
                        </div>
                      )}

                      <div className="p-6 sm:p-8 grid md:grid-cols-2 gap-8 border-b border-gray-100">
                        <div>
                           <h3 className="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-2">Issue Reported</h3>
                           <p className="text-lg font-medium text-gray-800">{activeCase.title}</p>
                        </div>
                        <div>
                           <h3 className="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-2">{t.filedOn}</h3>
                           <p className="text-lg font-medium text-gray-800">{activeCase.filedAt}</p>
                        </div>
                        <div className="md:col-span-2">
                           <h3 className="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-2">{t.assignedTo}</h3>
                           <p className="text-lg font-medium text-gray-800 bg-blue-50 inline-block px-4 py-2 rounded border border-blue-100">
                             {activeCase.officer}
                           </p>
                        </div>
                      </div>

                      {/* Tabs */}
                      <div className="flex border-b border-gray-200 mt-4 px-6 sm:px-8 space-x-8">
                        <button 
                          className={`pb-4 font-bold text-lg border-b-2 transition-all duration-300 ${activeTab === 'timeline' ? 'border-[#002B5B] text-[#002B5B]' : 'border-transparent text-gray-500 hover:text-gray-700'}`}
                          onClick={() => setActiveTab('timeline')}
                        >
                          {t.timelineTab}
                        </button>
                        <button 
                          className={`pb-4 font-bold text-lg border-b-2 transition-all duration-300 flex items-center gap-2 ${activeTab === 'chat' ? 'border-[#002B5B] text-[#002B5B]' : 'border-transparent text-gray-500 hover:text-gray-700'}`}
                          onClick={() => setActiveTab('chat')}
                        >
                          <div className={activeTab === 'chat' ? 'text-[#002B5B]' : 'text-gray-400'}><MessageCircle /></div>
                          {t.chatTab}
                        </button>
                      </div>

                      <div className="p-6 sm:p-8">
                        {/* Timeline View */}
                        <div className={`transition-opacity duration-300 ${activeTab === 'timeline' ? 'block' : 'hidden'}`}>
                          <h3 className="text-xl font-bold text-gray-900 mb-8 flex items-center gap-2">
                            <div className="text-[#002B5B]"><Clock /></div>
                            {t.timelineTitle}
                          </h3>
                          
                          <div className="relative border-l-2 border-blue-100 ml-4">
                            {activeCase.updates.map((update, index) => (
                              <div key={update.id} className="mb-10 ml-8 relative animate-fade-in-up" style={{ animationDelay: `${index * 150}ms` }}>
                                <span className="absolute -left-11 flex items-center justify-center w-6 h-6 rounded-full bg-white ring-8 ring-white">
                                  <CheckCircle2 className={`w-6 h-6 ${index === 0 ? 'text-blue-500' : 'text-green-500'}`} />
                                </span>
                                <div className="text-sm text-gray-500 mb-1 font-semibold">{update.date}</div>
                                <div className="bg-gray-50 border border-gray-200 rounded-lg p-4 text-gray-700 shadow-sm transition-shadow hover:shadow">
                                  {update.text}
                                </div>
                              </div>
                            ))}
                          </div>
                        </div>

                        {/* AI Chat Assistant View */}
                        <div className={`transition-opacity duration-300 ${activeTab === 'chat' ? 'block animate-fade-in-up' : 'hidden'}`}>
                          <div className="bg-blue-50 rounded-xl p-4 sm:p-6 border border-blue-100 flex flex-col h-[400px]">
                            <div className="flex items-center gap-3 mb-4 pb-4 border-b border-blue-200">
                               <div className="bg-[#002B5B] text-white p-2 rounded-full"><MessageCircle /></div>
                               <div>
                                 <h3 className="font-bold text-lg text-gray-900">{t.chatHeader}</h3>
                                 <p className="text-sm text-gray-500">{t.chatStatus}</p>
                               </div>
                            </div>
                            
                            <div className="flex-grow overflow-y-auto pr-2 space-y-4 mb-4 custom-scrollbar">
                              {messages.map((msg) => (
                                <div key={msg.id} className={`flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                                  <div className={`max-w-[80%] rounded-2xl p-4 text-sm ${msg.sender === 'user' ? 'bg-[#002B5B] text-white rounded-tr-sm' : 'bg-white text-gray-800 border border-gray-200 rounded-tl-sm shadow-sm'}`}>
                                    {msg.text.split('\n').map((line, i, arr) => (
                                      <React.Fragment key={i}>
                                        {line}
                                        {i !== arr.length - 1 && <br />}
                                      </React.Fragment>
                                    ))}
                                  </div>
                                </div>
                              ))}
                              {isTyping && (
                                <div className="flex justify-start">
                                  <div className="bg-white text-gray-500 border border-gray-200 rounded-2xl rounded-tl-sm p-4 shadow-sm text-sm italic animate-pulse">
                                    {t.typingMsg}
                                  </div>
                                </div>
                              )}
                            </div>

                            <form onSubmit={handleSendMessage} className="mt-auto relative">
                              <input 
                                type="text" 
                                value={chatInput}
                                onChange={(e) => setChatInput(e.target.value)}
                                placeholder={t.chatInputPlaceholder}
                                className="w-full bg-white border border-gray-300 p-4 rounded-xl pr-24 outline-none focus:border-[#002B5B] focus:ring-1 ring-[#002B5B]"
                              />
                              <button 
                                type="submit" 
                                disabled={!chatInput.trim() || isTyping}
                                className="absolute right-2 top-2 bottom-2 bg-[#002B5B] text-white px-4 rounded-lg font-semibold hover:bg-blue-900 disabled:opacity-50 transition-colors"
                              >
                                {t.chatSend}
                              </button>
                            </form>
                          </div>
                        </div>
                      </div>

                    </div>
                  </div>
                </div>
              )}
            </main>

            {/* Footer */}
            <footer className="bg-gray-900 text-gray-400 py-8 text-center mt-auto">
              <div className="max-w-7xl mx-auto px-4">
                <div className="flex items-center justify-center gap-2 mb-4 opacity-50">
                  <Shield />
                  <span className="font-bold text-xl">{t.title}</span>
                </div>
                <p>{t.footerText}</p>
              </div>
            </footer>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
</body>
</html>
